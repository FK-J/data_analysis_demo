# MySQL 数据库连接配置示例。
# 使用方式：
# 1. 复制本文件为 configs/database.yaml
# 2. 修改 profiles 下的连接信息
# 3. 不要提交 configs/database.yaml

default_profile: local_mysql

profiles:
  local_mysql:
    dialect: mysql
    driver: pymysql
    host: "${MYSQL_HOST:127.0.0.1}"
    port: 3306
    username: "${MYSQL_USER:your_username}"
    password: "${MYSQL_PASSWORD:your_password}"
    database: "${MYSQL_DATABASE:your_database}"
    charset: utf8mb4
    echo: false
    pool_pre_ping: true
    pool_recycle: 3600
    connect_timeout: 10
    read_timeout: 60
    write_timeout: 60
    readonly: true

  # 后续不同分析项目可以新增 profile，而不需要修改 Python 连接代码。
  # example_project_mysql:
  #   dialect: mysql
  #   driver: pymysql
